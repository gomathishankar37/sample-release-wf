name: Component Auto-Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version or hotfix tag (example: 1.0.0)"
        required: true
        type: string
      hotfix:
        description: "Run hotfix flow"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  authorize-and-release:
    name: Authorize Trigger User and Run Git Flow
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.event.inputs.release_version }}
      HOTFIX: ${{ github.event.inputs.hotfix }}
      REPO: ${{ github.repository }}
      ACTOR: ${{ github.actor }}
      GH_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}

    steps:
      - name: Validate required secret
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN}" ]; then
            echo "RELEASE_AUTOMATION_TOKEN is required."
            exit 1
          fi

      - name: Validate version format
        run: |
          set -euo pipefail
          if ! [[ "${RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][A-Za-z0-9._]+)?$ ]]; then
            echo "Invalid version/tag format: ${RELEASE_VERSION}"
            echo "Use semantic style, for example: 1.2.3 or 1.2.3-rc1"
            exit 1
          fi

      - name: Authorize actor (maintainer or owner only)
        run: |
          set -euo pipefail
          permission=$(gh api "repos/${REPO}/collaborators/${ACTOR}/permission" -q '.permission' | tr '[:upper:]' '[:lower:]')
          echo "Actor '${ACTOR}' repository permission: ${permission}"
          case "${permission}" in
            admin|maintain)
              echo "Authorization successful."
              ;;
            *)
              echo "Unauthorized: only maintainers/owners can run release automation."
              exit 1
              ;;
          esac

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}

      - name: Install release tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y git-flow jq
          npm install -g auto-changelog

      - name: Configure git identity
        run: |
          set -euo pipefail
          git config user.name "${ACTOR}"
          git config user.email "${ACTOR}@users.noreply.github.com"

      - name: Run git-flow release
        if: ${{ github.event.inputs.hotfix == 'false' }}
        run: |
          set -euo pipefail
          git fetch --prune origin
          git checkout develop
          git reset --hard origin/develop

          if [ -z "$(git config --get gitflow.branch.master || true)" ] || [ -z "$(git config --get gitflow.branch.develop || true)" ]; then
            printf '%s\n' \
              'main' \
              'develop' \
              'feature/' \
              'bugfix/' \
              'release/' \
              'hotfix/' \
              'support/' \
              '' \
              '.git/hooks' | git flow init -f
          fi

          release_branch="release/${RELEASE_VERSION}"
          if git show-ref --verify --quiet "refs/heads/${release_branch}" || git ls-remote --exit-code --heads origin "${release_branch}" >/dev/null 2>&1; then
            echo "${release_branch} already exists. Skipping release start/publish."
          else
            git flow release start "${RELEASE_VERSION}"

            auto-changelog -v "${RELEASE_VERSION}"
            git add CHANGELOG.md
            if ! git diff --cached --quiet; then
              git commit -m "${RELEASE_VERSION} release changelog updates"
            else
              echo "No CHANGELOG.md updates to commit."
            fi

            git flow release publish "${RELEASE_VERSION}"
          fi

      - name: Create release pull requests
        if: ${{ github.event.inputs.hotfix == 'false' }}
        run: |
          set -euo pipefail
          release_branch="release/${RELEASE_VERSION}"

          main_pr_number=$(gh pr list --head "${release_branch}" --base main --state open --json number -q '.[0].number')
          if [ -z "${main_pr_number}" ]; then
            gh pr create \
              --base main \
              --head "${release_branch}" \
              --title "Release ${RELEASE_VERSION} to main" \
              --body "Automated release PR for ${RELEASE_VERSION}."
          else
            echo "PR from ${release_branch} to main already exists."
          fi

          develop_pr_number=$(gh pr list --head "${release_branch}" --base develop --state open --json number -q '.[0].number')
          if [ -z "${develop_pr_number}" ]; then
            gh pr create \
              --base develop \
              --head "${release_branch}" \
              --title "Release ${RELEASE_VERSION} sync to develop" \
              --body "Automated release sync PR for ${RELEASE_VERSION}."
          else
            echo "PR from ${release_branch} to develop already exists."
          fi

      - name: Run git-flow hotfix
        if: ${{ github.event.inputs.hotfix == 'true' }}
        run: |
          set -euo pipefail
          git fetch --prune origin
          git checkout main
          git reset --hard origin/main

          if [ -z "$(git config --get gitflow.branch.master || true)" ] || [ -z "$(git config --get gitflow.branch.develop || true)" ]; then
            printf '%s\n' \
              'main' \
              'develop' \
              'feature/' \
              'bugfix/' \
              'release/' \
              'hotfix/' \
              'support/' \
              '' \
              '.git/hooks' | git flow init -f
          fi

          hotfix_branch="hotfix/${RELEASE_VERSION}"
          if git show-ref --verify --quiet "refs/heads/${hotfix_branch}" || git ls-remote --exit-code --heads origin "${hotfix_branch}" >/dev/null 2>&1; then
            echo "${hotfix_branch} already exists. Skipping hotfix start."
          else
            git flow hotfix start "${RELEASE_VERSION}"

            auto-changelog -v "${RELEASE_VERSION}"
            git add CHANGELOG.md
            if ! git diff --cached --quiet; then
              git commit -m "${RELEASE_VERSION} hotfix release"
            else
              echo "No CHANGELOG.md updates to commit."
            fi
          fi

          if git rev-parse -q --verify "refs/tags/${RELEASE_VERSION}" >/dev/null; then
            echo "Tag ${RELEASE_VERSION} already exists locally. Skipping hotfix finish."
            exit 0
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_VERSION} already exists on origin. Skipping hotfix finish."
            exit 0
          fi

          if git show-ref --verify --quiet "refs/heads/${hotfix_branch}"; then
            git checkout "${hotfix_branch}"
          elif git ls-remote --exit-code --heads origin "${hotfix_branch}" >/dev/null 2>&1; then
            git checkout -b "${hotfix_branch}" "origin/${hotfix_branch}"
          else
            echo "${hotfix_branch} does not exist locally or on origin."
            exit 1
          fi

          git flow hotfix finish -m "Hotfix ${RELEASE_VERSION}" "${RELEASE_VERSION}"
          git push origin main
          git push origin --tags
          git push origin develop

      - name: Workflow summary
        if: always()
        run: |
          {
            echo "## Component Auto-Release Summary"
            echo "- Repository: ${REPO}"
            echo "- Trigger actor: ${ACTOR}"
            echo "- Version/tag: ${RELEASE_VERSION}"
            echo "- Hotfix mode: ${HOTFIX}"
          } >> "$GITHUB_STEP_SUMMARY"
